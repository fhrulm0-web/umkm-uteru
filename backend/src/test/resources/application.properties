spring.application.name=pos-backend-test
spring.datasource.url=jdbc:h2:mem:pos_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${TEST_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.web.cors.allowed-origins=http://localhost:5173
pos.seed-users.enabled=false
pos.security.max-request-bytes=65536
pos.security.rate-limit.api.max-requests=1000
pos.security.rate-limit.api.window=PT15M
pos.security.rate-limit.auth.max-attempts=1000
pos.security.rate-limit.auth.window=PT15M
