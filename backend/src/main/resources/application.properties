spring.application.name=pos-backend
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Singapore
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Singapore

# Persist schema changes and seed data from Java initializer
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.open-in-view=false

# Jackson: serialize dates as ISO-8601 strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=true

# Error responses should not expose stack traces or exception messages.
server.error.include-message=never
server.error.include-stacktrace=never

# Security controls
pos.security.max-request-bytes=${POS_MAX_REQUEST_BYTES:65536}
pos.security.rate-limit.api.max-requests=${POS_API_RATE_LIMIT_MAX:300}
pos.security.rate-limit.api.window=${POS_API_RATE_LIMIT_WINDOW:PT15M}
pos.security.rate-limit.auth.max-attempts=${POS_AUTH_RATE_LIMIT_MAX:5}
pos.security.rate-limit.auth.window=${POS_AUTH_RATE_LIMIT_WINDOW:PT15M}

# Seed users are disabled unless explicitly configured with real passwords.
pos.seed-users.enabled=${POS_SEED_USERS_ENABLED:false}
pos.seed-users.owner-password=${POS_SEED_OWNER_PASSWORD:}
pos.seed-users.staff1-password=${POS_SEED_STAFF1_PASSWORD:}
pos.seed-users.staff2-password=${POS_SEED_STAFF2_PASSWORD:}

# CORS
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
