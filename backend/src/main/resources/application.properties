spring.application.name=pos-backend
server.port=8080
server.address=0.0.0.0
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:posdb}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Singapore
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Singapore

# Persist schema changes and seed data from Java initializer
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.open-in-view=false

# Jackson: serialize dates as ISO-8601 strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# CORS
spring.web.cors.allowed-origins=*
